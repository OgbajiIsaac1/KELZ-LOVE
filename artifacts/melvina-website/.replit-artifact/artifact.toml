kind = "web"
previewPath = "/"
title = "Melvina Igboanugo Website"
version = "1.0.0"
id = "artifacts/melvina-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20395

[services.development]
run = "pnpm --filter @workspace/melvina-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/melvina-website", "run", "build" ]
publicDir = "artifacts/melvina-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20395"
BASE_PATH = "/"
